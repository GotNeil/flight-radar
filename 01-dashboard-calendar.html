    h+='<div style="background:'+dateBg+';width:100%;text-align:center;padding:1px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:'+dateH+'px">';
    h+='<div style="font-size:'+FS.date+'px;font-weight:600;line-height:1'+(isWe||hol?';color:'+TC.weekend:'')+'">'+d+'</div>';
    h+='<div style="font-size:'+FS.holiday+'px;font-weight:600;line-height:1;min-height:'+FS.holiday+'px;color:'+(hol?TC.holiday:'transparent')+'">'+(hol||'.')+'</div>';
    h+='</div>';

    h+='<div style="background:'+outBg+';width:100%;text-align:center;padding:1px;flex:1;display:flex;align-items:center;justify-content:center;border-top:1px solid rgba(0,0,0,0.04)">';
    if(op) h+='<div style="font-size:'+FS.priceOut+'px;font-weight:700;color:'+TC.price+'"><i class="fa-solid fa-plane-departure" style="font-size:'+FS.icon+'px"></i> '+fmtP(op)+'</div>';
    h+='</div>';

    h+='<div style="background:'+retBg+';width:100%;text-align:center;padding:1px;flex:1;display:flex;align-items:center;justify-content:center;border-top:1px solid rgba(0,0,0,0.04)">';
    if(rp) h+='<div style="font-size:'+FS.priceIn+'px;font-weight:700;color:'+TC.priceAlt+'"><i class="fa-solid fa-plane-arrival" style="font-size:'+FS.icon+'px"></i> '+fmtP(rp)+'</div>';
    h+='</div>';

    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderMonthBar(){
  var bar=document.getElementById('month-bar');
  var h='<span style="font-size:11px;font-weight:600;color:#555">月份</span>';
  for(var i=0;i<12;i++){
    var m=CUR_MONTH+i,y=CUR_YEAR;if(m>11){m-=12;y++;}
    h+='<button class="month-btn'+(y===viewYear&&m===viewMonth?' active':'')+'" onclick="setMonth('+y+','+m+')">'+y+'/'+(m+1)+'</button>';
  }
  bar.innerHTML=h;
}

function setMonth(y,m){viewYear=y;viewMonth=m;renderMonthBar();renderAll();}

function renderAll(){
  var depData=DEP_DATA[activeDep];
  if(!depData){document.getElementById('route-sections').innerHTML='<p style="color:#999;text-align:center;padding:40px">無資料</p>';return;}

  var totalRoutes=0;
  var container=document.getElementById('route-sections');
  var html='';

  var groupIdx = 0;
  depData.groups.forEach(function(group){
    totalRoutes+=group.routes.length;
    html+='<div class="country-label">'+group.flag+' '+group.country+' <span class="country-badge">'+group.routes.length+' 航線</span></div>';

    // 第一組國家下方插入價格色票
    if (groupIdx === 0) {
      html += '<div style="margin:0 0 10px;padding:6px 12px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;display:flex;flex-direction:column;gap:4px">';
      // 第一行：去程 回程 六日 假日
      html += '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
      html += '<span style="display:flex;align-items:center;gap:4px"><i class="fa-solid fa-plane-departure" style="font-size:8px;color:'+TC.price+'"></i> 去程(中段底色)</span>';
      html += '<span style="display:flex;align-items:center;gap:4px"><i class="fa-solid fa-plane-arrival" style="font-size:8px;color:'+TC.priceAlt+'"></i> 回程(下段底色)</span>';
      html += '<span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+BG.weekend+'"></span> 六日</span>';
      html += '<span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+BG.holiday+'"></span> 假日</span>';
      html += '</div>';
      // 第二行：價格底色色階
      html += '<div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">';
      html += '<span style="font-weight:600;color:#555;margin-right:2px">價格底色</span>';
      PP.forEach(function(p) {
        var lbl = p.lte >= 10000 ? (p.lte>=99999?'>10k':Math.round(p.lte/1000)+'k') : p.lte.toLocaleString();
        html += '<span style="display:inline-block;padding:1px 5px;border-radius:3px;background:'+p.bg+';color:'+txtC(p.bg)+';font-size:8px;font-weight:600">\u2264'+lbl+'</span>';
      });
      html += '</div>';
      html += '</div>';
    }

    html+='<div class="routes-grid">';

    group.routes.forEach(function(route){
      // 當月最低價
      var mPfx=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-';
      var mBestO=null,mBestR=null;
      Object.keys(route.out).forEach(function(k){if(k.startsWith(mPfx)){var v=route.out[k];if(!mBestO||v<mBestO)mBestO=v;}});
      Object.keys(route.ret).forEach(function(k){if(k.startsWith(mPfx)){var v=route.ret[k];if(!mBestR||v<mBestR)mBestR=v;}});

      // 左上：航線名稱
      var depLabel = activeDep==='TPE'?'台北桃園':activeDep==='KHH'?'高雄':activeDep==='RMQ'?'臺中':activeDep;
      html+='<div class="rc"><div class="rc-head"><div>';
      html+='<div class="rc-city">'+depLabel+' '+activeDep+' - '+route.city+' '+route.code+' <span style="font-weight:400;color:#999;font-size:11px;margin-left:4px">'+viewYear+'/'+String(viewMonth+1).padStart(2,'0')+'</span></div>';
      html+='<div class="rc-caa">'+route.caa+'</div>';
      html+='</div><div style="text-align:right">';
      // 右上：當月最低去程/回程
      if(mBestO||mBestR){
        html+='<div class="rc-dir" style="gap:6px">';
        if(mBestO)html+='<span style="background:'+getBg(mBestO)+';color:'+txtC(getBg(mBestO))+';padding:2px 8px;border-radius:4px;font-weight:700;font-size:14px"><i class="fa-solid fa-plane-departure" style="font-size:10px"></i> '+mBestO.toLocaleString()+'</span>';
        if(mBestR)html+='<span style="background:'+getBg(mBestR)+';color:'+txtC(getBg(mBestR))+';padding:2px 8px;border-radius:4px;font-weight:700;font-size:14px"><i class="fa-solid fa-plane-arrival" style="font-size:10px"></i> '+mBestR.toLocaleString()+'</span>';
        html+='</div>';
      }else{html+='<span style="color:#ccc;font-size:11px">當月無資料</span>';}
      html+='</div></div>';
      html+='<div class="cal-wrap">'+buildMiniCal(route.out,route.ret,viewYear,viewMonth,{origin:activeDep,dest:route.code,city:route.city,affUrl:route.affUrl||''})+'</div>';
      html+='</div>';
    });
    html+='</div>';
    groupIdx++;
  });

  container.innerHTML=html;
  document.getElementById('topbar-sub').textContent=depData.label+' . '+totalRoutes+' 條航線 . '+viewYear+'/'+(viewMonth+1);
}

// Init
(function(){
  var tabs=document.getElementById('dep-tabs');
  var deps=[{k:'TPE',l:'TPE 台北'},{k:'KHH',l:'KHH 高雄'},{k:'RMQ',l:'RMQ 臺中'}];
  tabs.innerHTML=deps.map(function(d){
    return '<button class="dep-tab'+(d.k===activeDep?' active':'')+'" onclick="switchDep(this,\''+d.k+'\')">'+d.l+'</button>';
  }).join('');
})();

function switchDep(el,dep){
  document.querySelectorAll('.dep-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  activeDep=dep;
  renderAll();
}

renderMonthBar();
renderAll();

// ============================================================
// Price Popup
// ============================================================
function showPricePopup(evt, date, outPrice, retPrice, origin, dest, city, affUrl) {
  evt.stopPropagation();
  closePricePopup();

  var d = new Date(date+'T00:00:00');
  var dateLabel = (d.getMonth()+1)+'/'+d.getDate()+'('+DN[d.getDay()]+')';

  // Build aff URLs for outbound and return
  function makeUrl(dir, dt) {
    if (!affUrl) return '';
    try {
      var u = new URL(affUrl);
      u.searchParams.set('ddate', dt);
      if (dir === 'return') {
        // Swap dcity/acity for return
        var dc = u.searchParams.get('dcity');
        var ac = u.searchParams.get('acity');
        u.searchParams.set('dcity', ac);
        u.searchParams.set('acity', dc);
        u.pathname = u.pathname.replace(/\/flights\/[^/]+\/tickets-[^?]+/, '/flights/'+dest+'-to-'+origin+'/tickets-'+dest+'-'+origin);
      }
      return u.toString();
    } catch(e) { return ''; }
  }

  var outUrl = outPrice > 0 ? makeUrl('outbound', date) : '';
  var retUrl = retPrice > 0 ? makeUrl('return', date) : '';

  var popup = document.createElement('div');
  popup.id = 'price-popup';
  popup.style.cssText = 'position:fixed;z-index:9999;background:#fff;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,0.18);padding:16px;min-width:220px;font-size:13px;';

  var h = '<div style="font-weight:700;font-size:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">';
  h += '<span>'+origin+' ⇄ '+city+' '+dest+'</span>';
  h += '<button onclick="closePricePopup()" style="border:none;background:none;cursor:pointer;font-size:16px;color:#999;padding:0 0 0 8px">&times;</button>';
  h += '</div>';
  h += '<div style="font-size:12px;color:#888;margin-bottom:12px">'+dateLabel+'</div>';

  // Outbound
  if (outPrice > 0) {
    var obg = getBg(outPrice);
    h += '<a href="'+(outUrl||'#')+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:'+obg+';text-decoration:none;color:'+txtC(obg)+';margin-bottom:6px;font-weight:600;transition:opacity 0.15s'+(outUrl?'':';pointer-events:none;opacity:0.5')+'">';
    h += '<i class="fa-solid fa-plane-departure" style="font-size:14px"></i>';
    h += '<div><div style="font-size:11px;opacity:0.7">去程 '+origin+'→'+dest+'</div><div style="font-size:16px">TWD '+fmtP(outPrice)+'</div></div>';
    h += '<i class="fa-solid fa-arrow-up-right-from-square" style="margin-left:auto;font-size:11px;opacity:0.5"></i>';
    h += '</a>';
  }

  // Return
  if (retPrice > 0) {
    var rbg = getBg(retPrice);
    h += '<a href="'+(retUrl||'#')+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:'+rbg+';text-decoration:none;color:'+txtC(rbg)+';font-weight:600;transition:opacity 0.15s'+(retUrl?'':';pointer-events:none;opacity:0.5')+'">';
    h += '<i class="fa-solid fa-plane-arrival" style="font-size:14px"></i>';
    h += '<div><div style="font-size:11px;opacity:0.7">回程 '+dest+'→'+origin+'</div><div style="font-size:16px">TWD '+fmtP(retPrice)+'</div></div>';
    h += '<i class="fa-solid fa-arrow-up-right-from-square" style="margin-left:auto;font-size:11px;opacity:0.5"></i>';
    h += '</a>';
  }

  if (!outUrl && !retUrl) {
    h += '<div style="font-size:11px;color:#999;text-align:center;padding:8px">尚未建立推廣連結</div>';
  }

  popup.innerHTML = h;
  document.body.appendChild(popup);

  // Position near click
  var x = evt.clientX, y = evt.clientY;
  var pw = popup.offsetWidth, ph = popup.offsetHeight;
  var ww = window.innerWidth, wh = window.innerHeight;
  popup.style.left = Math.min(x + 8, ww - pw - 16) + 'px';
  popup.style.top = Math.min(y + 8, wh - ph - 16) + 'px';

  // Close on outside click
  setTimeout(function() {
    document.addEventListener('click', _closePricePopupHandler);
  }, 0);
}

function _closePricePopupHandler(e) {
  var popup = document.getElementById('price-popup');
  if (popup && !popup.contains(e.target)) closePricePopup();
}

function closePricePopup() {
  var popup = document.getElementById('price-popup');
  if (popup) popup.remove();
  document.removeEventListener('click', _closePricePopupHandler);
}
</script>
